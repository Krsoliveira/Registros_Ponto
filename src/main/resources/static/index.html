<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ponto — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="bg-shapes">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        <div class="shape s3"></div>
    </div>

    <div class="login-card glass">
        <div class="login-header">
            <div class="login-icon">⏱</div>
            <h1>Registro de <span class="accent">Ponto</span></h1>
            <p class="login-subtitle">Acesse sua conta para continuar</p>
        </div>

        <form id="loginForm">
            <div class="field-group">
                <label for="login">Login / Matrícula</label>
                <input type="text" id="login" placeholder="Digite seu login" autocomplete="username" required>
            </div>
            <div class="field-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" required>
            </div>
            <div id="loginError" class="msg-error" style="display:none;"></div>
            <button type="submit" class="btn-full" id="loginBtn">Entrar</button>
        </form>

        <p class="login-hint">Funcionários: login = matrícula, senha padrão = matrícula</p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
